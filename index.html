<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tiny Dino Chomp</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>🦕 Tiny Dino Chomp</h1>

  <!-- Score display -->
  <p id="score-display">Score: <span id="score">0</span></p>

  <!-- Win message (hidden until all dinos collected) -->
  <p id="win-message" class="hidden">You chomped all the dinos! 🎉</p>

  <!-- The game grid is built here by script.js -->
  <div id="grid"></div>

  <p class="instructions">Use the <strong>arrow keys</strong> to move the yellow chomper 😮 and collect all the dinos 🦕!</p>

  <script src="script.js"></script>
</body>
</html>
